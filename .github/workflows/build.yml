name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'dockerfile'
      - '*_template.conf'
      - 'ngx_stream_nrpc_preread_module.c'
      - 'compile.sh'
      - 'entrypoint.sh'
      - '.github/workflows/build.yml'

  workflow_dispatch:
    inputs:
      base_image:
        description: 'Base image'
        required: false
        default: 'cgr.dev/chainguard/wolfi-base'
        type: choice
        options:
          - cgr.dev/chainguard/wolfi-base
          - alpine

env:
  DEFAULT_BASE_IMAGE: cgr.dev/chainguard/wolfi-base

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read versions
        run: |
          . ./current_version.txt
          echo "NGINX_VER=$NGINX_VER" >> $GITHUB_ENV
          echo "ANGIE_VER=$ANGIE_VER" >> $GITHUB_ENV
          echo "NRPC_PROXY_VER=$NRPC_PROXY_VER" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV
          echo "BUILDTIME=$(date -u +"%d.%m.%Y %H:%M:%S")" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/nashcom/domino-nrpc-proxy
          labels: |
            org.opencontainers.image.title=Domino NRPC Proxy
            org.opencontainers.image.description=HCL Domino NRPC reverse proxy with custom nginx stream module for the Notes NRPC protocol
            org.opencontainers.image.vendor=NashCom
            org.opencontainers.image.authors=Daniel Nashed <nsh@nashcom.de>
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.url=https://github.com/nashcom/domino-nrpc-proxy
            nginx-version=${{ env.NGINX_VER }}
            angie-version=${{ env.ANGIE_VER }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ github.event.inputs.base_image || env.DEFAULT_BASE_IMAGE }}
            TARGET=nginx
            VERSION=${{ env.NGINX_VER }}
            IMAGE_NAME=Domino NRPC Proxy
            NRPC_PROXY_VER=${{ env.NRPC_PROXY_VER }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILDTIME=${{ env.BUILDTIME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

